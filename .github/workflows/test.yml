name: Tests
on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Run tests
        working-directory: controller-go
        run: go test ./... -v -count=1
      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          working-directory: controller-go
          version: latest
