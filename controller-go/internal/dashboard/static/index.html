<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OpinAI Dashboard</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>

<div class="refresh-bar" id="refreshBar"></div>

<!-- Toast notifications -->
<div id="toastContainer" class="toast-container"></div>

<header class="header">
  <div class="header-left">
    <div class="header-logo">&#x1F3B3; OpinAI</div>
    <div class="header-tagline">Automated Bug Reproduction</div>
  </div>
  <div class="header-right">
    <span>
      <span class="status-dot green" id="statusDot"></span>
      <span id="clusterName">Connecting...</span>
    </span>
    <span>Uptime: <strong id="uptime">--</strong></span>
    <span>Polls: <strong id="pollCount">0</strong></span>
    <a href="/admin" style="color:var(--text-dim);font-size:13px">&#x2699;&#xFE0F; Admin</a>
  </div>
</header>

<main class="main">

  <!-- Reproduce input -->
  <section class="section">
    <div class="reproduce-bar">
      <input type="text" id="reproduceInput" class="reproduce-input"
             placeholder="Paste issue URL (e.g. https://github.com/owner/repo/issues/42)">
      <button class="btn btn-primary" onclick="reproduceFromUrl()">&#x1F9EA; Reproduce</button>
    </div>
  </section>

  <!-- Monitored Repos -->
  <section class="section">
    <div class="section-header">
      <h2 class="section-title">Monitored Repos</h2>
      <button class="btn btn-primary" onclick="checkNow()">&#x1F50D; Check All</button>
    </div>
    <div class="cards" id="repoCards">
      <div class="empty">Loading repos...</div>
    </div>
  </section>

  <!-- All Issues (unified jobs + runs) -->
  <section class="section">
    <div class="section-header">
      <h2 class="section-title">All Issues</h2>
      <div class="filter-bar" id="repoFilter"></div>
    </div>
    <div id="issuesContainer">
      <div class="empty">Loading...</div>
    </div>
  </section>

</main>

<footer class="footer">
  "That's just, like, your opinion, man." &mdash;
  <a href="https://github.com/yossiovadia/opinai">OpinAI</a>
</footer>

<!-- Post preview modal -->
<div class="modal-overlay" id="postModal" style="display:none" onclick="if(event.target===this)closePostModal()">
  <div class="modal-card">
    <div class="modal-header">
      <h3>Review comment before posting to GitHub</h3>
      <button class="chat-close" onclick="closePostModal()">&times;</button>
    </div>
    <div class="modal-meta" id="postModalMeta"></div>
    <div class="modal-body expand-content" id="postModalBody"></div>
    <div class="modal-footer">
      <button class="btn" onclick="closePostModal()">Cancel</button>
      <button class="btn btn-post-confirm" id="postModalConfirm" onclick="confirmPost()">&#x2705; Post to GitHub</button>
    </div>
  </div>
</div>

<!-- Chat toggle button -->
<button class="chat-toggle" id="chatToggle" onclick="toggleChat()" title="Ask OpinAI">&#x1F3B3;</button>

<!-- Chat panel -->
<div class="chat-panel" id="chatPanel">
  <div class="chat-panel-header">
    <div>
      <div class="chat-panel-title">&#x1F3B3; Ask OpinAI</div>
      <div class="chat-context-label" id="chatContextLabel">General context</div>
    </div>
    <button class="chat-close" onclick="toggleChat()">&times;</button>
  </div>
  <div class="chat-messages" id="chatMessages"></div>
  <div class="chat-suggestions" id="chatSuggestions"></div>
  <div class="chat-input-area">
    <textarea class="chat-input" id="chatInput" placeholder="Ask about a bug, issue, or reproduction..." rows="1"></textarea>
    <button class="chat-send" id="chatSend" onclick="sendChat()">Send</button>
  </div>
</div>

<script>
const API = '';
const REFRESH_INTERVAL = 30000;
let activeRepoFilter = null;
let allRuns = [];

async function fetchJSON(url) {
  const resp = await fetch(API + url);
  if (!resp.ok) throw new Error(resp.statusText);
  return resp.json();
}

function timeAgo(ts) {
  if (!ts) return 'never';
  const diff = (Date.now() - new Date(ts).getTime()) / 1000;
  if (diff < 60) return Math.floor(diff) + 's ago';
  if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
  if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
  return Math.floor(diff / 86400) + 'd ago';
}

function escapeHtml(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function verdictBadge(verdict) {
  if (!verdict) return '<span class="verdict verdict-error">--</span>';
  switch (verdict.toUpperCase()) {
    case 'BUG_CONFIRMED': return '<span class="verdict verdict-bug">&#x1F534; Bug Confirmed</span>';
    case 'BUG_REGRESSION': return '<span class="verdict verdict-regression">&#x1F6A8; Regression</span>';
    case 'BUG_FIXED': return '<span class="verdict verdict-ok">&#x2705; Bug Fixed</span>';
    case 'NOT_A_BUG': return '<span class="verdict verdict-ok">&#x2705; Not a Bug</span>';
    case 'NOT_REPRODUCIBLE': return '<span class="verdict verdict-warn">&#x26A0;&#xFE0F; Not Reproducible</span>';
    case 'FEATURE_REQUEST': return '<span class="verdict verdict-feature">&#x2728; Feature Request</span>';
    case 'ERROR': return '<span class="verdict verdict-error">&#x26D4; Error</span>';
    default: return '<span class="verdict verdict-error">' + escapeHtml(verdict) + '</span>';
  }
}

function jobStatusBadge(status) {
  switch (status) {
    case 'Completed': return '<span class="verdict verdict-ok">Completed</span>';
    case 'Failed': return '<span class="verdict verdict-bug">Failed</span>';
    default: return '<span class="verdict verdict-running">Running</span>';
  }
}

function categoryBadge(cat) {
  if (!cat) return '<span class="verdict verdict-error">--</span>';
  switch (cat.toUpperCase()) {
    case 'BUG': return '<span class="verdict verdict-bug">&#x1F41B; BUG</span>';
    case 'FEATURE': return '<span class="verdict verdict-feature">&#x2728; FEATURE</span>';
    case 'QUESTION': return '<span class="verdict verdict-warn">&#x2753; QUESTION</span>';
    case 'DOCS': return '<span class="verdict verdict-warn">&#x1F4D6; DOCS</span>';
    default: return '<span class="verdict verdict-error">' + escapeHtml(cat) + '</span>';
  }
}

function confidenceBadge(level) {
  if (!level) return '<span class="verdict verdict-error">--</span>';
  switch (level.toUpperCase()) {
    case 'HIGH': return '<span class="verdict verdict-ok">HIGH</span>';
    case 'MEDIUM': return '<span class="verdict verdict-warn">MEDIUM</span>';
    case 'LOW': return '<span class="verdict verdict-bug">LOW</span>';
    default: return '<span class="verdict verdict-error">' + escapeHtml(level) + '</span>';
  }
}

// --- Toast notifications ---
function showToast(message, type) {
  type = type || 'info';
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  toast.className = 'toast toast-' + type;
  toast.textContent = message;
  container.appendChild(toast);
  // Trigger animation
  requestAnimationFrame(function() { toast.classList.add('toast-visible'); });
  setTimeout(function() {
    toast.classList.remove('toast-visible');
    toast.classList.add('toast-hiding');
    setTimeout(function() { toast.remove(); }, 300);
  }, 4000);
}

// Refresh bar animation
function animateRefresh() {
  const bar = document.getElementById('refreshBar');
  bar.style.width = '100%';
  setTimeout(function() { bar.style.width = '0'; }, 400);
}

// --- Status ---
async function loadStatus() {
  try {
    const data = await fetchJSON('/api/status');
    document.getElementById('uptime').textContent = data.uptime_human;
    document.getElementById('pollCount').textContent = data.poll_count;
    document.getElementById('statusDot').className = 'status-dot green';
    document.getElementById('clusterName').textContent = 'Connected';
  } catch(e) {
    document.getElementById('statusDot').className = 'status-dot red';
    document.getElementById('clusterName').textContent = 'Disconnected';
  }
}

// --- Repos ---
async function loadRepos() {
  try {
    const repos = await fetchJSON('/api/repos');
    const container = document.getElementById('repoCards');
    if (!repos.length) {
      container.innerHTML = '<div class="empty">No repos configured</div>';
      return;
    }
    container.innerHTML = repos.map(function(r) {
      var footerAction = r.manual_only
        ? '<span class="verdict verdict-warn" style="font-size:11px">&#x1F527; Manual</span>'
        : '<button class="btn" onclick="checkNow()">Check Now</button>';
      return '<div class="card">' +
        '<div class="card-header">' +
          '<a class="card-title" href="https://github.com/' + escapeHtml(r.name) + '" target="_blank">' + escapeHtml(r.name) + '</a>' +
          '<span class="badge badge-repo-filter" onclick="event.preventDefault(); toggleRepoFilter(\'' + escapeHtml(r.name) + '\')">' +
            (activeRepoFilter === r.name ? 'Filtering' : 'Filter runs') +
          '</span>' +
        '</div>' +
        '<div class="card-stats">' +
          '<div><span class="stat-value">' + (r.processed || 0) + '</span> <span class="stat-label">processed</span></div>' +
          (r.manual_only ? '' : '<div><span class="stat-value">' + (r.pending || 0) + '</span> <span class="stat-label">pending</span></div>') +
        '</div>' +
        '<div class="card-footer">' +
          '<span>Last check: ' + timeAgo(r.last_check) + '</span>' +
          footerAction +
        '</div>' +
      '</div>';
    }).join('');
  } catch(e) {
    document.getElementById('repoCards').innerHTML = '<div class="empty">Failed to load repos</div>';
  }
}

// --- Unified Issues (jobs + runs) ---
let allRawJobs = [];
let expandedRows = new Set();

async function loadIssues() {
  try {
    var results = await Promise.all([fetchJSON('/api/jobs'), fetchJSON('/api/runs')]);
    allRawJobs = results[0];
    allRuns = results[1];
    renderIssues();
    renderRepoFilter();
  } catch(e) {
    document.getElementById('issuesContainer').innerHTML = '<div class="table-wrap"><div class="empty">Failed to load issues</div></div>';
  }
}

function mergeIssues() {
  // Build a map keyed by "repo#issue" — one entry per unique issue
  var map = {};

  // Add runs first (completed results — richest data)
  allRuns.forEach(function(r) {
    var key = (r.repo || '') + '#' + (r.issue || '');
    map[key] = {
      repo: r.repo, issue: r.issue, title: r.title || '',
      category: r.category, verdict: r.verdict, confidence: r.confidence,
      status: 'Done', duration: r.duration, timestamp: r.timestamp,
      posted: r.posted, report: r.report, runId: r.id,
      logs: ''
    };
  });

  // Merge jobs — running overrides, otherwise enrich existing or add new
  allRawJobs.forEach(function(j) {
    var key = (j.repo || '') + '#' + (j.issue || '');
    var jobStatus = j.status === 'Failed' ? 'Failed'
                  : j.status === 'Completed' ? 'Done'
                  : 'Running';

    if (map[key]) {
      // Entry exists from a run — only override if job is still running
      if (jobStatus === 'Running') {
        map[key].status = 'Running';
        map[key].logs = j.logs || '';
        if (j.duration) map[key].duration = j.duration;
      }
      // For Done/Failed jobs where a run already exists, keep the run data
    } else {
      // No run for this issue yet — create entry from job
      map[key] = {
        repo: j.repo || '', issue: j.issue || '', title: '',
        category: '', verdict: '', confidence: '',
        status: jobStatus, duration: j.duration || '', timestamp: j.created || '',
        posted: false, report: '', runId: null,
        logs: j.logs || ''
      };
    }
  });

  // Convert to array, sorted by timestamp (newest first)
  var items = Object.values(map);
  items.sort(function(a, b) {
    var ta = a.timestamp ? new Date(a.timestamp).getTime() : 0;
    var tb = b.timestamp ? new Date(b.timestamp).getTime() : 0;
    return tb - ta;
  });
  return items;
}

function statusBadge(status) {
  switch (status) {
    case 'Running': return '<span class="verdict verdict-running"><span class="spin">&#x1F504;</span> Running</span>';
    case 'Done': return '<span class="verdict verdict-ok">&#x2705; Done</span>';
    case 'Failed': return '<span class="verdict verdict-bug">&#x274C; Failed</span>';
    case 'Pending': return '<span class="verdict verdict-warn">&#x23F3; Pending</span>';
    default: return '<span class="verdict verdict-error">' + escapeHtml(status) + '</span>';
  }
}

function renderRepoFilter() {
  var repos = {};
  mergeIssues().forEach(function(r) { if (r.repo) repos[r.repo] = true; });
  var names = Object.keys(repos);
  var container = document.getElementById('repoFilter');
  if (names.length <= 1) { container.innerHTML = ''; return; }
  var html = '<button class="btn filter-btn' + (!activeRepoFilter ? ' filter-active' : '') + '" onclick="toggleRepoFilter(null)">All</button>';
  names.forEach(function(name) {
    html += '<button class="btn filter-btn' + (activeRepoFilter === name ? ' filter-active' : '') + '" onclick="toggleRepoFilter(\'' + escapeHtml(name) + '\')">' + escapeHtml(name) + '</button>';
  });
  container.innerHTML = html;
}

function toggleRepoFilter(repo) {
  activeRepoFilter = (activeRepoFilter === repo) ? null : repo;
  renderIssues();
  renderRepoFilter();
  loadRepos();
}

function renderIssues() {
  // Save expanded state before re-render
  document.querySelectorAll('.expand-row').forEach(function(row) {
    if (row.style.display !== 'none') expandedRows.add(row.id);
  });

  var items = mergeIssues();
  if (activeRepoFilter) items = items.filter(function(r) { return r.repo === activeRepoFilter; });
  var container = document.getElementById('issuesContainer');

  if (!items.length) {
    container.innerHTML = '<div class="table-wrap"><div class="empty">' + (activeRepoFilter ? 'No issues for ' + escapeHtml(activeRepoFilter) : 'No issues yet') + '</div></div>';
    return;
  }

  var html = '<div class="table-wrap"><table>' +
    '<thead><tr><th>#</th><th>Repo</th><th>Title</th><th>Category</th><th>Status</th><th>Verdict</th><th class="col-confidence">Confidence</th><th></th></tr></thead>' +
    '<tbody>';

  items.forEach(function(r, i) {
    var rowId = 'issue-' + (r.repo || '').replace(/[^a-zA-Z0-9]/g, '-') + '-' + r.issue;
    var issueUrl = r.repo ? ('https://github.com/' + r.repo + '/issues/' + r.issue) : '#';
    var expandContent = r.report || r.logs || '(no details)';

    // Actions
    var actions = '';
    if (r.status === 'Running') {
      // nothing extra
    } else if (r.status === 'Done' && r.verdict !== 'FEATURE_REQUEST') {
      if (r.posted) {
        actions += '<button class="btn" disabled style="color:var(--green);border-color:var(--green)">&#x2705; Posted</button> ';
      } else if (r.runId) {
        actions += '<button class="btn" id="post-btn-' + r.runId + '" onclick="event.stopPropagation(); showPostPreview(' + r.runId + ', \'' + escapeHtml(r.repo) + '\', \'' + r.issue + '\')" title="Post to GitHub">&#x1F4DD; Post</button> ';
      }
    }
    if (r.repo && r.issue && r.status !== 'Running') {
      actions += '<button class="btn" onclick="event.stopPropagation(); setChatContext(\'' + escapeHtml(r.repo) + '\', ' + r.issue + ', \'' + escapeHtml(r.title || '').replace(/'/g, "\\'") + '\')" title="Ask OpinAI">&#x1F3B3;</button> ';
    }
    if (r.status === 'Done' || r.status === 'Failed') {
      actions += '<button class="btn" onclick="event.stopPropagation(); rerun(\'' + r.repo + '\', ' + r.issue + ')" title="Re-run">&#x1F504;</button>';
    }
    // Verify Fix button for closed/fixed issues
    if (r.status === 'Done' && (r.verdict === 'BUG_FIXED' || r.verdict === 'BUG_REGRESSION' || r.verdict === 'NOT_REPRODUCIBLE')) {
      actions += ' <button class="btn" onclick="event.stopPropagation(); verifyFix(\'' + escapeHtml(r.repo) + '\', ' + r.issue + ')" title="Verify the fix with full deployment">&#x1F50D; Verify Fix</button>';
    }

    html += '<tr class="expandable" onclick="toggleExpand(\'' + rowId + '\')">' +
      '<td><a href="' + issueUrl + '" target="_blank" onclick="event.stopPropagation()">#' + escapeHtml(r.issue + '') + '</a></td>' +
      '<td><span class="badge badge-repo" onclick="event.stopPropagation(); toggleRepoFilter(\'' + escapeHtml(r.repo) + '\')">' + escapeHtml(r.repo) + '</span></td>' +
      '<td class="td-title">' + escapeHtml(r.title || '') + '</td>' +
      '<td>' + categoryBadge(r.category) + '</td>' +
      '<td>' + statusBadge(r.status) + '</td>' +
      '<td>' + (r.verdict ? verdictBadge(r.verdict) : '--') + '</td>' +
      '<td class="col-confidence">' + (r.confidence ? confidenceBadge(r.confidence) : '--') + '</td>' +
      '<td>' + actions + '</td>' +
    '</tr>' +
    '<tr class="expand-row" id="' + rowId + '" style="display:none">' +
      '<td colspan="8"><div class="expand-content">' + renderMarkdown(expandContent) + '</div></td>' +
    '</tr>';
  });

  html += '</tbody></table></div>';
  container.innerHTML = html;

  // Restore expanded state
  expandedRows.forEach(function(id) {
    var row = document.getElementById(id);
    if (row) row.style.display = '';
  });
}

function toggleExpand(id) {
  var el = document.getElementById(id);
  if (!el) return;
  if (el.style.display === 'none') {
    el.style.display = '';
    expandedRows.add(id);
  } else {
    el.style.display = 'none';
    expandedRows.delete(id);
  }
}

// --- Actions ---
async function checkNow() {
  showToast('Checking for new issues...', 'info');
  animateRefresh();
  var source = new EventSource(API + '/api/check-now-stream');
  source.addEventListener('progress', function(e) {
    var d = JSON.parse(e.data);
    showToast(d.message, 'info');
  });
  source.addEventListener('done', function(e) {
    var d = JSON.parse(e.data);
    showToast(d.message, d.total > 0 ? 'success' : 'info');
    source.close();
    refreshAll();
  });
  source.addEventListener('error', function() {
    source.close();
    showToast('Check failed', 'error');
  });
}

var _pendingPostRunId = null;

function showPostPreview(runId, repo, issue) {
  // Find the report for this run from allRuns
  var report = '';
  for (var i = 0; i < allRuns.length; i++) {
    if (allRuns[i].id === runId) { report = allRuns[i].report || '(no report)'; break; }
  }
  _pendingPostRunId = runId;
  document.getElementById('postModalMeta').innerHTML =
    '<strong>' + escapeHtml(repo) + '#' + escapeHtml(issue) + '</strong>';
  document.getElementById('postModalBody').innerHTML = renderMarkdown(report);
  document.getElementById('postModalConfirm').disabled = false;
  document.getElementById('postModalConfirm').innerHTML = '&#x2705; Post to GitHub';
  document.getElementById('postModal').style.display = '';
}

function closePostModal() {
  document.getElementById('postModal').style.display = 'none';
  _pendingPostRunId = null;
}

async function confirmPost() {
  var runId = _pendingPostRunId;
  if (!runId) return;
  var confirmBtn = document.getElementById('postModalConfirm');
  confirmBtn.disabled = true;
  confirmBtn.innerHTML = '&#x23F3; Posting...';
  try {
    var resp = await fetch(API + '/api/runs/' + runId + '/post-comment', { method: 'POST' });
    var data = await resp.json();
    if (data.status === 'posted') {
      showToast('Comment posted to ' + data.repo + '#' + data.issue, 'success');
      closePostModal();
      var btn = document.getElementById('post-btn-' + runId);
      if (btn) { btn.innerHTML = '&#x2705; Posted'; btn.disabled = true; btn.style.color = 'var(--green)'; btn.style.borderColor = 'var(--green)'; }
      setTimeout(refreshAll, 1000);
    } else {
      showToast('Failed: ' + (data.message || 'unknown error'), 'error');
      confirmBtn.disabled = false;
      confirmBtn.innerHTML = '&#x2705; Post to GitHub';
    }
  } catch(e) {
    showToast('Failed to post comment', 'error');
    confirmBtn.disabled = false;
    confirmBtn.innerHTML = '&#x2705; Post to GitHub';
  }
}

async function rerun(repo, issue) {
  try {
    showToast('Re-running ' + repo + '#' + issue + '...', 'info');
    await fetch(API + '/api/rerun/' + repo + '/' + issue, { method: 'POST' });
    animateRefresh();
    setTimeout(refreshAll, 2000);
  } catch(e) {
    showToast('Failed to trigger re-run', 'error');
  }
}

async function verifyFix(repo, issue) {
  try {
    showToast('Verifying fix for ' + repo + '#' + issue + ' (full deployment)...', 'info');
    var resp = await fetch(API + '/api/verify-fix', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ repo: repo, issue_number: issue })
    });
    var data = await resp.json();
    if (data.status === 'triggered') {
      showToast('Verify-fix job created for ' + repo + '#' + issue, 'success');
      setTimeout(refreshAll, 3000);
    } else {
      showToast('Error: ' + (data.error || 'unknown'), 'error');
    }
  } catch(e) {
    showToast('Failed to trigger verify-fix', 'error');
  }
}

function parseIssueUrl(url) {
  // Match: https://github.com/owner/repo/issues/42
  var m = url.match(/github\.com\/([^/]+\/[^/]+)\/issues\/(\d+)/);
  if (m) return { repo: m[1], issue: parseInt(m[2]) };
  return null;
}

async function reproduceFromUrl() {
  var input = document.getElementById('reproduceInput');
  var url = input.value.trim();
  if (!url) { showToast('Paste a GitHub issue URL first', 'error'); return; }
  var parsed = parseIssueUrl(url);
  if (!parsed) { showToast('Invalid issue URL format', 'error'); return; }
  // Check if repo is monitored
  try {
    var repos = await fetchJSON('/api/repos');
    var monitored = repos.map(function(r) { return r.name; });
    if (monitored.indexOf(parsed.repo) === -1) {
      showToast('This repo is not monitored by OpinAI. Add it first.', 'error');
      return;
    }
  } catch(e) { /* proceed anyway, server will validate */ }
  showToast('Reproducing ' + parsed.repo + '#' + parsed.issue + '...', 'info');
  input.value = '';
  var source = new EventSource(API + '/api/reproduce-stream?repo=' + encodeURIComponent(parsed.repo) + '&issue=' + parsed.issue);
  source.addEventListener('progress', function(e) {
    var d = JSON.parse(e.data);
    showToast(d.message, 'info');
  });
  source.addEventListener('done', function(e) {
    var d = JSON.parse(e.data);
    showToast(d.message, 'success');
    source.close();
    refreshAll();
  });
  source.addEventListener('error', function(e) {
    try { var d = JSON.parse(e.data); showToast(d.message, 'error'); } catch(x) { showToast('Reproduction failed', 'error'); }
    source.close();
    refreshAll();
  });
}

// Enter key on reproduce input
document.getElementById('reproduceInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') reproduceFromUrl();
});

async function refreshAll() {
  animateRefresh();
  await Promise.all([loadStatus(), loadRepos(), loadIssues()]);
}

// =====================================================================
// Chat panel
// =====================================================================
var chatOpen = false;
var chatContext = {};  // {repo, issue_number}
var chatHistory = [];  // [{role: 'user'|'ai', content: '...'}]
var chatBusy = false;

function toggleChat() {
  chatOpen = !chatOpen;
  document.getElementById('chatPanel').classList.toggle('chat-open', chatOpen);
  if (chatOpen) {
    renderSuggestions();
    document.getElementById('chatInput').focus();
  }
}

function setChatContext(repo, issue, title) {
  // If context changed, clear history
  if (chatContext.repo !== repo || chatContext.issue_number !== issue) {
    chatHistory = [];
    renderChatMessages();
  }
  chatContext = { repo: repo, issue_number: issue };
  var label = repo + '#' + issue;
  if (title) label += ' — ' + title;
  document.getElementById('chatContextLabel').textContent = 'Discussing: ' + label;
  renderSuggestions();
  // Open panel
  if (!chatOpen) toggleChat();
}

function clearChatContext() {
  chatContext = {};
  chatHistory = [];
  document.getElementById('chatContextLabel').textContent = 'General context';
  renderChatMessages();
  renderSuggestions();
}

function renderSuggestions() {
  var container = document.getElementById('chatSuggestions');
  var chips = [];
  if (chatContext.repo && chatContext.issue_number) {
    chips = [
      'Is this a real bug or user error?',
      'How would you reproduce this?',
      'What\'s the root cause?',
      'Suggest a fix',
      'Draft a response to the issue author'
    ];
  } else {
    chips = [
      'What issues are pending?',
      'Show me the latest results',
      'What repos am I monitoring?'
    ];
  }
  // Don't show suggestions if there's already chat history
  if (chatHistory.length > 0) { container.innerHTML = ''; return; }
  container.innerHTML = chips.map(function(c) {
    return '<button class="chat-chip" onclick="sendSuggestion(\'' + escapeHtml(c).replace(/'/g, "\\'") + '\')">' + escapeHtml(c) + '</button>';
  }).join('');
}

function sendSuggestion(text) {
  document.getElementById('chatInput').value = text;
  sendChat();
}

// Markdown renderer — handles headings, bold, code, tables, details, lists
function renderMarkdown(text) {
  if (!text) return '';

  // Extract <details>...</details> blocks and code fences before escaping
  var preserved = [];
  // Preserve <details> blocks as-is
  text = text.replace(/<details[\s\S]*?<\/details>/gi, function(m) {
    preserved.push(m);
    return '\x00PRESERVE' + (preserved.length - 1) + '\x00';
  });
  // Preserve code fences
  text = text.replace(/```(\w*)\n?([\s\S]*?)```/g, function(_, lang, code) {
    var block = '<pre><code>' + escapeHtml(code.trim()) + '</code></pre>';
    preserved.push(block);
    return '\x00PRESERVE' + (preserved.length - 1) + '\x00';
  });

  // Now escape the rest
  var html = escapeHtml(text);

  // Restore preserved blocks
  html = html.replace(/\x00PRESERVE(\d+)\x00/g, function(_, i) {
    return preserved[parseInt(i)];
  });

  // Headings (## and ###)
  html = html.replace(/^### (.+)$/gm, '<h4>$1</h4>');
  html = html.replace(/^## (.+)$/gm, '<h3>$1</h3>');

  // Tables: detect lines with | separators
  html = html.replace(/((?:^\|.+\|$\n?)+)/gm, function(block) {
    var rows = block.trim().split('\n');
    var out = '<table class="md-table">';
    rows.forEach(function(row, ri) {
      // Skip separator rows (|---|---|)
      if (/^\|[\s\-:|]+\|$/.test(row)) return;
      var tag = ri === 0 ? 'th' : 'td';
      var cells = row.split('|').filter(function(c, i, a) { return i > 0 && i < a.length - 1; });
      out += '<tr>';
      cells.forEach(function(cell) {
        out += '<' + tag + '>' + cell.trim() + '</' + tag + '>';
      });
      out += '</tr>';
    });
    out += '</table>';
    return out;
  });

  // Inline code (after escaping)
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
  // Bold
  html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  // Italic
  html = html.replace(/(?<!\*)\*([^*]+)\*(?!\*)/g, '<em>$1</em>');
  // Unordered lists
  html = html.replace(/^- (.+)$/gm, '<li>$1</li>');
  html = html.replace(/((?:<li>.*<\/li>\n?)+)/g, '<ul>$1</ul>');
  // Ordered lists
  html = html.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');
  // Horizontal rules
  html = html.replace(/^---$/gm, '<hr>');
  // Paragraphs (double newline)
  html = html.replace(/\n\n/g, '</p><p>');
  // Single newlines -> <br> (but not after block elements)
  html = html.replace(/(?<!\>)\n(?!\<)/g, '<br>');

  return '<div class="md-rendered"><p>' + html + '</p></div>';
}

function renderChatMessages() {
  var container = document.getElementById('chatMessages');
  if (!chatHistory.length) {
    container.innerHTML = '<div class="empty" style="padding:20px;font-size:13px;">Ask me anything about your bugs and issues.</div>';
    return;
  }
  var html = '';
  chatHistory.forEach(function(msg, i) {
    if (msg.role === 'user') {
      html += '<div class="chat-msg chat-msg-user">' + escapeHtml(msg.content) + '</div>';
    } else {
      var msgId = 'ai-msg-' + i;
      html += '<div class="chat-msg chat-msg-ai">' +
        '<span class="chat-avatar">&#x1F3B3;</span>' +
        '<button class="chat-msg-copy" onclick="event.stopPropagation(); copyAiMsg(\'' + msgId + '\')" title="Copy">Copy</button>' +
        '<div class="msg-content" id="' + msgId + '">' + renderMarkdown(msg.content) + '</div>' +
      '</div>';
    }
  });
  container.innerHTML = html;
  container.scrollTop = container.scrollHeight;
}

function showTypingIndicator() {
  var container = document.getElementById('chatMessages');
  var typing = document.createElement('div');
  typing.className = 'chat-typing';
  typing.id = 'chatTyping';
  typing.innerHTML = '<span class="chat-typing-dot"></span><span class="chat-typing-dot"></span><span class="chat-typing-dot"></span>';
  container.appendChild(typing);
  container.scrollTop = container.scrollHeight;
}

function removeTypingIndicator() {
  var el = document.getElementById('chatTyping');
  if (el) el.remove();
}

async function sendChat() {
  if (chatBusy) return;
  var input = document.getElementById('chatInput');
  var message = input.value.trim();
  if (!message) return;

  // Add user message
  chatHistory.push({ role: 'user', content: message });
  input.value = '';
  renderChatMessages();
  renderSuggestions(); // clear chips after first message

  // Show typing
  chatBusy = true;
  document.getElementById('chatSend').disabled = true;
  showTypingIndicator();

  // Stream AI response via SSE (POST body sent as query-safe fetch, then EventSource)
  // EventSource only supports GET, so we use fetch with streaming reader
  try {
    var resp = await fetch(API + '/api/chat-stream', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: message, context: chatContext })
    });
    removeTypingIndicator();
    var aiContent = '';
    chatHistory.push({ role: 'ai', content: '' });
    var aiIdx = chatHistory.length - 1;
    var reader = resp.body.getReader();
    var decoder = new TextDecoder();
    var buffer = '';
    while (true) {
      var result = await reader.read();
      if (result.done) break;
      buffer += decoder.decode(result.value, { stream: true });
      var lines = buffer.split('\n');
      buffer = lines.pop();
      for (var ln of lines) {
        if (ln.startsWith('data: ')) {
          try {
            var d = JSON.parse(ln.substring(6));
            if (d.text) { aiContent += d.text; chatHistory[aiIdx].content = aiContent; renderChatMessages(); }
          } catch(x) {}
        }
      }
    }
    if (!aiContent) { chatHistory[aiIdx].content = 'No response.'; renderChatMessages(); }
  } catch(e) {
    removeTypingIndicator();
    chatHistory.push({ role: 'ai', content: 'Failed to reach the AI service. Please try again.' });
    renderChatMessages();
  }

  chatBusy = false;
  document.getElementById('chatSend').disabled = false;
  input.focus();
}

function copyAiMsg(id) {
  var el = document.getElementById(id);
  if (!el) return;
  var text = el.innerText || el.textContent;
  navigator.clipboard.writeText(text).then(function() {
    showToast('Copied to clipboard', 'success');
  });
}

// Chat input: Ctrl+Enter or Enter to send, Shift+Enter for newline
document.getElementById('chatInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendChat();
  }
});

// Auto-resize chat input
document.getElementById('chatInput').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 100) + 'px';
});

// Initial load + auto-refresh
refreshAll();
setInterval(refreshAll, REFRESH_INTERVAL);
</script>
