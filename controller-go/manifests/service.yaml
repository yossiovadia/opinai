apiVersion: v1
kind: Service
metadata:
  name: opinai-controller
  namespace: opinai
  labels:
    app: opinai-controller
spec:
  type: NodePort
  selector:
    app: opinai-controller
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      nodePort: 30080
    - name: https
      port: 8443
      targetPort: 8443
