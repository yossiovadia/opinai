name: 'OpinAI — Automated Bug Reproduction'
description: "AI-powered bug reproduction. Automatically validates reported bugs against your running server with protocol compliance tests."
branding:
  icon: 'target'
  color: 'orange'

inputs:
  issue_number:
    description: 'GitHub issue number to investigate'
    required: true
  install_command:
    description: 'Command to install your server (runs before server_command)'
    required: false
    default: ''
  server_command:
    description: 'Command to start your server in background'
    required: false
    default: ''
  server_url:
    description: 'Base URL of your running server'
    default: 'http://localhost:8000'
  wait_seconds:
    description: 'Seconds to wait for server to become healthy'
    default: '15'
  test_script:
    description: 'Path to a custom test script (overrides built-in tests)'
    required: false
    default: ''
  github_token:
    description: 'GitHub token for posting comments on issues'
    required: true

runs:
  using: 'composite'
  steps:
    - name: Check dependencies
      shell: bash
      run: |
        for cmd in curl jq gh; do
          if ! command -v "$cmd" &>/dev/null; then
            echo "::error::Required command '$cmd' not found"
            exit 1
          fi
        done

    - name: Install server
      if: inputs.install_command != ''
      shell: bash
      run: |
        echo "🔧 Installing server..."
        ${{ inputs.install_command }}
        echo "✅ Server installed"

    - name: Reproduce bug
      shell: bash
      env:
        ISSUE_NUMBER: ${{ inputs.issue_number }}
        SERVER_COMMAND: ${{ inputs.server_command }}
        SERVER_URL: ${{ inputs.server_url }}
        WAIT_SECONDS: ${{ inputs.wait_seconds }}
        TEST_SCRIPT: ${{ inputs.test_script }}
        GITHUB_TOKEN: ${{ inputs.github_token }}
        GITHUB_REPOSITORY: ${{ github.repository }}
      run: |
        chmod +x "${{ github.action_path }}/scripts/"*.sh
        "${{ github.action_path }}/scripts/reproduce.sh"
