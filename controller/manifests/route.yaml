apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: opinai-dashboard
  namespace: opinai
  labels:
    app: opinai-controller
  annotations:
    haproxy.router.openshift.io/timeout: 300s
spec:
  to:
    kind: Service
    name: opinai-controller
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
