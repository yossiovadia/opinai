apiVersion: apps/v1
kind: Deployment
metadata:
  name: opinai-controller
  namespace: opinai
  labels:
    app: opinai-controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app: opinai-controller
  template:
    metadata:
      labels:
        app: opinai-controller
    spec:
      serviceAccountName: opinai-controller
      containers:
        - name: controller
          image: image-registry.openshift-image-registry.svc:5000/opinai/opinai-controller:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
            - containerPort: 8443
              name: https
              protocol: TCP
          envFrom:
            - configMapRef:
                name: opinai-config
            - secretRef:
                name: opinai-credentials
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
