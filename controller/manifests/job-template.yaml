# Reference template — the Go controller creates Jobs programmatically.
# Do NOT apply this directly.
apiVersion: batch/v1
kind: Job
metadata:
  name: "opinai-{repo_safe}-{issue_number}"
  namespace: opinai
  labels:
    app: opinai-runner
    opinai/repo: "{repo_safe}"
    opinai/issue: "{issue_number}"
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 3600
  template:
    spec:
      serviceAccountName: opinai-controller
      restartPolicy: Never
      containers:
        - name: runner
          image: image-registry.openshift-image-registry.svc:5000/opinai/opinai-controller:latest
          command: ["/app/opinai", "--mode=runner"]
          env:
            - name: REPO
              value: "{repo}"
            - name: ISSUE_NUMBER
              value: "{issue_number}"
          envFrom:
            - secretRef:
                name: opinai-credentials
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
