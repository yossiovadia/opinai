apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: opinai-sandbox-manager
rules:
  # Namespace lifecycle for sandbox namespaces
  # (opinai-sandbox- prefix enforced in code)
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["create", "get", "list", "watch", "delete"]
  # Full resource management within sandbox namespaces
  - apiGroups: [""]
    resources: ["pods", "pods/log", "pods/exec", "services", "configmaps",
                "secrets", "serviceaccounts", "resourcequotas",
                "persistentvolumeclaims"]
    verbs: ["create", "get", "list", "watch", "update", "patch", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "replicasets"]
    verbs: ["create", "get", "list", "watch", "update", "patch", "delete"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["create", "get", "list", "watch", "delete"]
  # Read-only cluster discovery
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["list"]
  - apiGroups: ["operators.coreos.com"]
    resources: ["clusterserviceversions"]
    verbs: ["list"]
