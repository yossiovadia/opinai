name: OpinAI Bug Reproduction
on:
  issues:
    types: [labeled]

jobs:
  reproduce:
    if: github.event.label.name == 'needs-reproduction'
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: yossiovadia/opinai@main
        with:
          issue_number: ${{ github.event.issue.number }}
          install_command: 'pip install llm-katan'
          server_command: 'llm-katan --model test --backend echo --providers openai,anthropic,vertexai,bedrock,azure_openai --port 8000'
          github_token: ${{ secrets.GITHUB_TOKEN }}
